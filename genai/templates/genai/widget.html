<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AIOps Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f5efe5;
            --panel: #fffaf0;
            --ink: #1e2933;
            --accent: #0f766e;
            --accent-soft: #d4efe9;
            --muted: #5f6b76;
            --line: rgba(30, 41, 51, 0.12);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 30%),
                linear-gradient(180deg, #faf6ee 0%, var(--bg) 100%);
            color: var(--ink);
            display: flex;
            flex-direction: column;
        }

        #genai-chat-modal {
            display: flex;
            width: 100%;
            height: 100%;
            flex-direction: column;
            background-color: var(--panel);
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: 0 24px 64px rgba(30, 41, 51, 0.12);
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="genai-chat-modal" class="card">
        {% include 'genai/includes/chat_widget.html' %}
    </div>
</body>
</html>
