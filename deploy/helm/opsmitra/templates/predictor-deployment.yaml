apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opsmitra.fullname" . }}-predictor
  labels:
    {{- include "opsmitra.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "opsmitra.name" . }}
      app.kubernetes.io/component: predictor
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "opsmitra.name" . }}
        app.kubernetes.io/component: predictor
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: predictor
          image: "{{ .Values.images.web.repository }}:{{ .Values.images.web.tag }}"
          imagePullPolicy: {{ .Values.images.web.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - python3 manage.py run_prediction_loop --interval {{ .Values.predictor.intervalSeconds }}
          envFrom:
            - configMapRef:
                name: {{ include "opsmitra.fullname" . }}-env
            - secretRef:
                name: {{ include "opsmitra.fullname" . }}-secret
          volumeMounts:
            - name: media
              mountPath: /code/mediafiles
            - name: applogs
              mountPath: /var/log/aiops
          resources:
            {{- toYaml .Values.resources.predictor | nindent 12 }}
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "opsmitra.fullname" . }}-media
        - name: applogs
          emptyDir: {}
