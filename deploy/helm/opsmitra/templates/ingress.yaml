{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "opsmitra.fullname" . }}
  labels:
    {{- include "opsmitra.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ if eq .service "web" }}{{ include "opsmitra.webServiceName" $ }}{{ else }}{{ include "opsmitra.frontendServiceName" $ }}{{ end }}
                port:
                  number: {{ if eq .service "web" }}{{ $.Values.service.webPort }}{{ else }}{{ $.Values.service.frontendPort }}{{ end }}
          {{- end }}
    {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
{{- end }}
