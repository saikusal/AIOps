{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "opsmitra.fullname" . }}-otel-config
  labels:
    {{- include "opsmitra.labels" . | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}

    exporters:
      otlp/jaeger:
        endpoint: {{ include "opsmitra.jaegerServiceName" . }}:4317
        tls:
          insecure: true
      prometheus:
        endpoint: 0.0.0.0:{{ .Values.observability.otelMetricsPort }}
      logging:
        loglevel: info

    processors:
      batch: {}

    connectors:
      spanmetrics:
        namespace: traces_spanmetrics

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/jaeger, spanmetrics, logging]
        metrics:
          receivers: [otlp, spanmetrics]
          processors: [batch]
          exporters: [prometheus, logging]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "opsmitra.fullname" . }}-metrics-config
  labels:
    {{- include "opsmitra.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      scrape_timeout: 10s

    scrape_configs:
      - job_name: otel-collector
        static_configs:
          - targets: ["{{ include "opsmitra.otelServiceName" . }}:{{ .Values.observability.otelMetricsPort }}"]

      - job_name: jaeger
        metrics_path: /metrics
        static_configs:
          - targets: ["{{ include "opsmitra.jaegerServiceName" . }}:14269"]
{{- end }}
