apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "opsmitra.fullname" . }}-integration-health
  labels:
    {{- include "opsmitra.labels" . | nindent 4 }}
    app.kubernetes.io/component: integration-health
spec:
  schedule: {{ .Values.integrationHealth.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "opsmitra.name" . }}
            app.kubernetes.io/component: integration-health
            app.kubernetes.io/instance: {{ .Release.Name }}
        spec:
          restartPolicy: Never
          containers:
            - name: integration-health
              image: "{{ .Values.images.web.repository }}:{{ .Values.images.web.tag }}"
              imagePullPolicy: {{ .Values.images.web.pullPolicy }}
              command:
                - sh
                - /code/entrypoint.sh
                - python3
                - manage.py
                - check_integrations
                - --fail-after
                - "{{ .Values.integrationHealth.failAfter }}"
              envFrom:
                - configMapRef:
                    name: {{ include "opsmitra.fullname" . }}-env
                - secretRef:
                    name: {{ include "opsmitra.fullname" . }}-secret
              volumeMounts:
                - name: media
                  mountPath: /code/mediafiles
                - name: applogs
                  mountPath: /var/log/aiops
          volumes:
            - name: media
              persistentVolumeClaim:
                claimName: {{ include "opsmitra.fullname" . }}-media
            - name: applogs
              emptyDir: {}
