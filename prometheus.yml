global:
  scrape_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/demo-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: jaeger
    metrics_path: /metrics
    static_configs:
      - targets: ["jaeger:14269"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: demo-apps
    metrics_path: /metrics
    static_configs:
      - targets:
          - "app-orders:8000"
          - "app-inventory:8000"
          - "app-billing:8000"

  - job_name: demo-nginx
    static_configs:
      - targets:
          - "frontend-exporter:9113"
          - "gateway-exporter:9113"

  - job_name: demo-gateway
    static_configs:
      - targets: ["gateway-exporter:9113"]
        labels:
          service: gateway

  - job_name: demo-frontend
    static_configs:
      - targets: ["frontend-exporter:9113"]
        labels:
          service: frontend
